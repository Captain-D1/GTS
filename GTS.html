<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GTS Anzeige</title>

<style>
body {
  margin: 0;
  padding: 40px;
  background-color: black;
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 48px;
  white-space: pre-wrap; /* Zeilenumbrüche aus TXT beibehalten */
}
</style>
</head>

<body>
<div id="content">Lade Text …</div>

<script>
fetch("anzeige.txt", { cache: "no-store" })
  .then(response => response.text())
  .then(text => {
    document.getElementById("content").innerText = text;
  })
  .catch(() => {
    document.getElementById("content").innerText =
      "Fehler: anzeige.txt konnte nicht geladen werden";
  });
</script>

</body>
</html>
