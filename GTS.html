<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GTS Anzeige</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

body {
  background-color: white;
  color: black;
  font-family: Arial, Helvetica, sans-serif;

  /* Zentrierung */
  display: flex;
  align-items: center;
  justify-content: center;

  /* Wichtige Teil: Text passt sich an */
  text-align: center;
  padding: 5vw;
  box-sizing: border-box;

  /* Responsive Schriftgröße */
  font-size: clamp(24px, 5vw, 80px);
  line-height: 1.3;
  white-space: pre-wrap; /* Zeilenumbrüche aus TXT übernehmen */
}
</style>
</head>

<body>
<div id="content">Lade Text …</div>

<script>
fetch("anzeige.txt", { cache: "no-store" })
  .then(response => response.text())
  .then(text => {
    document.getElementById("content").innerText = text;
  })
  .catch(() => {
    document.getElementById("content").innerText =
      "Fehler: anzeige.txt konnte nicht geladen werden";
  });
</script>

</body>
</html>
