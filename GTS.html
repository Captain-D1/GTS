<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GTS Anzeige</title>

<style>
body {
  margin: 0;
  padding: 40px;
  background: black;
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 48px;
  white-space: pre-wrap; /* wichtig für Zeilenumbrüche */
}
</style>
</head>

<body>
<div id="content">Lade Text …</div>

<script>
fetch("text.txt", { cache: "no-store" })
  .then(r => r.text())
  .then(t => document.getElementById("content").innerText = t)
  .catch(() => {
    document.getElementById("content").innerText =
      "Text konnte nicht geladen werden";
  });
</script>

</body>
</html>
